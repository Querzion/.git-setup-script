<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 320" width="760" height="320" style="background:#13161e;border-radius:12px;padding:16px">
  <defs>
    <marker id="arr-gold"  markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L0,6 L8,3 z" fill="#e2c97e" opacity="0.85"/></marker>
    <marker id="arr-blue"  markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L0,6 L8,3 z" fill="#7eb8e2" opacity="0.85"/></marker>
    <marker id="arr-green" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L0,6 L8,3 z" fill="#7ee2b0" opacity="0.85"/></marker>
    <marker id="arr-pink"  markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L0,6 L8,3 z" fill="#e27eb0" opacity="0.85"/></marker>
  </defs>

  <!-- MAIN passive rail — y=18, well above feature-a arc at y=72 -->
  <line x1="40" y1="18" x2="660" y2="18" stroke="#e2c97e" stroke-width="1.5" stroke-dasharray="6 5" opacity="0.25"/>
  <circle cx="40" cy="18" r="6" fill="#13161e" stroke="#e2c97e" stroke-width="1.8" opacity="0.4"/>
  <text font-family="monospace" font-size="12" font-weight="bold" fill="#e2c97e" opacity="0.55" x="40" y="13" text-anchor="middle">main</text>
  <text font-family="sans-serif" font-size="10" fill="#3a4258" x="320" y="10" text-anchor="middle">← untouched until deliberate deployment →</text>

  <!-- main-dev → main merge arrow -->
  <path d="M620,145 Q638,82 655,18" stroke="#e2c97e" stroke-width="2" fill="none" opacity="0.75" marker-end="url(#arr-gold)"/>
  <circle cx="655" cy="18" r="7" fill="#e2c97e" stroke="#e2c97e" stroke-width="2"/>
  <text font-family="monospace" font-size="11" font-weight="bold" fill="#e2c97e" x="676" y="22">main</text>
  <text font-family="sans-serif" font-size="10" fill="#4a5568" x="648" y="90" text-anchor="middle">when ready</text>

  <!-- main → auto-deploy -->
  <line x1="655" y1="18" x2="730" y2="18" stroke="#e27eb0" stroke-width="2" marker-end="url(#arr-pink)" opacity="0.9"/>
  <circle cx="730" cy="18" r="7" fill="#e27eb0" stroke="#e27eb0" stroke-width="2"/>
  <text font-family="monospace" font-size="10" font-weight="bold" fill="#e27eb0" x="730" y="13" text-anchor="middle">deploy</text>

  <!-- MAIN-DEV backbone — y=145 -->
  <line x1="40" y1="145" x2="630" y2="145" stroke="#7eb8e2" stroke-width="2.5" opacity="0.85" marker-end="url(#arr-blue)"/>
  <circle cx="40" cy="145" r="7" fill="#7eb8e2" stroke="#7eb8e2" stroke-width="2"/>
  <text font-family="monospace" font-size="12" font-weight="bold" fill="#7eb8e2" x="40" y="165" text-anchor="middle">main-dev</text>

  <!-- branch-out node -->
  <circle cx="155" cy="145" r="6" fill="#13161e" stroke="#7eb8e2" stroke-width="2.5"/>
  <text font-family="sans-serif" font-size="10" fill="#4a5568" x="155" y="165" text-anchor="middle">branch out</text>

  <!-- merge-in node -->
  <circle cx="560" cy="145" r="6" fill="#13161e" stroke="#7eb8e2" stroke-width="2.5"/>
  <text font-family="sans-serif" font-size="10" fill="#4a5568" x="560" y="165" text-anchor="middle">merge in</text>

  <circle cx="620" cy="145" r="7" fill="#13161e" stroke="#7eb8e2" stroke-width="2.5"/>

  <!-- dev/feature-a top arc — peaks at y=72, safely below main at y=18 -->
  <path d="M155,145 C170,145 200,72 240,72 L465,72 C505,72 535,145 560,145" stroke="#7ee2b0" stroke-width="2" fill="none" opacity="0.9" marker-end="url(#arr-green)"/>
  <circle cx="240" cy="72" r="5" fill="#13161e" stroke="#7ee2b0" stroke-width="2"/>
  <circle cx="465" cy="72" r="5" fill="#13161e" stroke="#7ee2b0" stroke-width="2"/>
  <text font-family="monospace" font-size="10" fill="#7ee2b0" opacity="0.85" x="352" y="62" text-anchor="middle">dev/feature-a</text>

  <!-- dev/feature-b dashed middle dip -->
  <path d="M155,145 C170,145 205,210 245,210 L460,210 C500,210 530,145 560,145" stroke="#7ee2b0" stroke-width="2" fill="none" opacity="0.6" stroke-dasharray="5 4" marker-end="url(#arr-green)"/>
  <circle cx="245" cy="210" r="5" fill="#13161e" stroke="#7ee2b0" stroke-width="2"/>
  <circle cx="460" cy="210" r="5" fill="#13161e" stroke="#7ee2b0" stroke-width="2"/>
  <text font-family="monospace" font-size="10" fill="#7ee2b0" opacity="0.6" x="352" y="228" text-anchor="middle">dev/feature-b</text>

  <!-- dev/feature-c bottom arc -->
  <path d="M155,145 C170,145 200,278 238,278 L465,278 C504,278 535,145 560,145" stroke="#7ee2b0" stroke-width="2" fill="none" opacity="0.9" marker-end="url(#arr-green)"/>
  <circle cx="238" cy="278" r="5" fill="#13161e" stroke="#7ee2b0" stroke-width="2"/>
  <circle cx="465" cy="278" r="5" fill="#13161e" stroke="#7ee2b0" stroke-width="2"/>
  <text font-family="monospace" font-size="10" fill="#7ee2b0" opacity="0.85" x="352" y="296" text-anchor="middle">dev/feature-c</text>
</svg>
